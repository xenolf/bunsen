name: Release

# Triggered by a v* tag push (production release path). workflow_dispatch is
# also accepted so the build + smoke-test path can be exercised end-to-end
# from a branch — the publish job is gated on `refs/tags/v*` so a manual
# dispatch from main produces wheel artifacts and stops short of PyPI.
#
# PyPI trusted publisher registration is a one-time manual step on the PyPI
# web UI and is out of scope for this workflow (see ADR-0009 and the slice-03
# PRD). The repo must have the GitHub environment named `pypi` configured.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheel (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
            docker_platform: linux/amd64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
            docker_platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # QEMU is needed only for the aarch64 smoke-test on an x86_64 runner.
      # The cross-compile itself uses the manylinux cross-toolchain inside
      # the maturin-action container and does not need QEMU.
      - name: Set up QEMU
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # The wheel needs both a script-style binary (maturin's `bindings =
      # "bin"` puts one in .data/scripts/) and a package-relative copy at
      # `bunsen/bin/bunsen-core` so `_core_path.find_core_bin()`'s tier-2
      # resolver locates it after install (see ADR-0009 and slice-01 commit).
      # `before-script-linux` runs inside the maturin-action manylinux
      # cross-toolchain container, where cargo + the target's linker are
      # pre-installed; the staged binary is then included in the wheel via
      # `python-source = "python"`.
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: '2_17'
          args: --release --out dist
          before-script-linux: |
            set -euo pipefail
            echo "[before-script] cross-compiling bunsen-core for ${{ matrix.target }}"
            cargo build --release --target ${{ matrix.target }} -p bunsen-core
            mkdir -p python/bunsen/bin
            cp "target/${{ matrix.target }}/release/bunsen-core" python/bunsen/bin/bunsen-core
            chmod +x python/bunsen/bin/bunsen-core
            echo "[before-script] staged binary at python/bunsen/bin/bunsen-core"

      # Guard against silent wheel-tag drift: the PRD pins manylinux_2_17 for
      # both arches, and a mistargeted wheel would install on the wrong host
      # set.
      - name: Verify wheel tag
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*manylinux_2_17_${{ matrix.arch }}*.whl)
          if [ "${#wheels[@]}" -eq 0 ]; then
            echo "::error::Expected a manylinux_2_17_${{ matrix.arch }} wheel; saw:"
            ls -la dist/
            exit 1
          fi
          echo "produced: ${wheels[*]}"

      # Smoke-test the wheel by installing it into a Docker container of the
      # wheel's target architecture (qemu emulation for aarch64) and importing
      # the package. python:3.11-slim is a glibc-based image that accepts
      # manylinux_2_17 wheels. Failure here fails the matrix entry and blocks
      # publish — see slice-03 AC about smoke-test gating.
      - name: Smoke-test wheel
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "${PWD}/dist:/dist:ro" \
            python:3.11-slim \
            sh -c 'pip install --quiet /dist/*.whl && python -c "import bunsen; print(bunsen.__version__)"'

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    # Tag-only: workflow_dispatch from a branch produces artifacts but stops
    # short of publish. This is the slice-03 "exercise end-to-end up to but
    # not including the real PyPI publish step" path.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/bunsen
    permissions:
      id-token: write  # OIDC token for PyPI trusted publisher
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheel-*
          merge-multiple: true

      - name: Inspect wheels to publish
        shell: bash
        run: |
          set -euo pipefail
          ls -la dist/
          count=$(find dist -maxdepth 1 -name '*.whl' | wc -l | tr -d ' ')
          if [ "$count" -ne 2 ]; then
            echo "::error::Expected 2 wheels (x86_64 + aarch64), saw $count"
            exit 1
          fi

      # OIDC trusted publisher: no PYPI_API_TOKEN or other long-lived secret
      # is referenced. The `environment: pypi` block above plus
      # `id-token: write` are sufficient once the trusted publisher has been
      # registered on the PyPI side.
      - name: Publish to PyPI (OIDC Trusted Publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
