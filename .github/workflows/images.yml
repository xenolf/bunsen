name: Images

# Builds the bunsen guest rootfs images as multi-arch OCI images, publishes
# them to GHCR, and opens a SINGLE automated PR pinning every image that was
# (re)built during the run to its new manifest digest.
#
# Images:
#   - bunsen-base            (adapters/base/Dockerfile)   → DEFAULT_ROOTFS_IMAGE
#   - bunsen-adapter-codex   (adapters/codex/Dockerfile)  → codex_adapter::OCI_IMAGE
#   - bunsen-adapter-pi      (adapters/pi/Dockerfile)     → pi_adapter::OCI_IMAGE
#
# Build rules (see `changes` job):
#   - base is built when adapters/base/Dockerfile changes
#   - an adapter is built when the base is rebuilt (its FROM digest moves) OR
#     when that adapter's own Dockerfile changes
#
# The auto-PR aggregates ALL digest updates from one run into one PR: three
# images rebuilt → three pins updated in the PR; one image rebuilt → one pin.
#
# Decoupled from the wheel release lifecycle. See ADR-0012.

on:
  push:
    branches:
      - main
    paths:
      - 'adapters/base/Dockerfile'
      - 'adapters/codex/Dockerfile'
      - 'adapters/pi/Dockerfile'
  workflow_dispatch:
    inputs:
      base:
        description: 'Rebuild bunsen-base (forces both adapters to rebuild)'
        type: boolean
        default: true
      codex:
        description: 'Rebuild bunsen-adapter-codex'
        type: boolean
        default: true
      pi:
        description: 'Rebuild bunsen-adapter-pi'
        type: boolean
        default: true

permissions:
  contents: write       # auto-PR creates the digest-update branch
  packages: write       # push to GHCR
  pull-requests: write  # open the auto-PR

env:
  REGISTRY: ghcr.io
  BASE_IMAGE_NAME: xenolf/bunsen/bunsen-base

jobs:
  # ── Decide what to build ────────────────────────────────────────────────────
  changes:
    name: Detect changed images
    runs-on: ubuntu-latest
    outputs:
      build_base: ${{ steps.decide.outputs.build_base }}
      build_codex: ${{ steps.decide.outputs.build_codex }}
      build_pi: ${{ steps.decide.outputs.build_pi }}
      any_adapter: ${{ steps.decide.outputs.any_adapter }}
      adapter_matrix: ${{ steps.decide.outputs.adapter_matrix }}
      current_base_digest: ${{ steps.decide.outputs.current_base_digest }}
    steps:
      - uses: actions/checkout@v4

      # Per-Dockerfile change detection for push events. For workflow_dispatch
      # there is no diff, so the manual inputs drive the decision instead.
      - name: Detect Dockerfile changes
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            base:
              - 'adapters/base/Dockerfile'
            codex:
              - 'adapters/codex/Dockerfile'
            pi:
              - 'adapters/pi/Dockerfile'

      - name: Decide build set
        id: decide
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          IN_BASE: ${{ inputs.base }}
          IN_CODEX: ${{ inputs.codex }}
          IN_PI: ${{ inputs.pi }}
          F_BASE: ${{ steps.filter.outputs.base }}
          F_CODEX: ${{ steps.filter.outputs.codex }}
          F_PI: ${{ steps.filter.outputs.pi }}
        run: |
          set -euo pipefail

          if [ "$DISPATCH" = "true" ]; then
            base_changed="$IN_BASE"
            codex_changed="$IN_CODEX"
            pi_changed="$IN_PI"
          else
            base_changed="${F_BASE:-false}"
            codex_changed="${F_CODEX:-false}"
            pi_changed="${F_PI:-false}"
          fi

          # A new base digest forces every adapter to rebuild on top of it.
          build_base="$base_changed"
          build_codex=false
          if [ "$base_changed" = "true" ] || [ "$codex_changed" = "true" ]; then build_codex=true; fi
          build_pi=false
          if [ "$base_changed" = "true" ] || [ "$pi_changed" = "true" ]; then build_pi=true; fi

          {
            echo "build_base=$build_base"
            echo "build_codex=$build_codex"
            echo "build_pi=$build_pi"
          } >> "$GITHUB_OUTPUT"

          # Dynamic matrix of only the adapters that need building.
          adapters=()
          if [ "$build_codex" = "true" ]; then adapters+=(codex); fi
          if [ "$build_pi" = "true" ]; then adapters+=(pi); fi
          if [ "${#adapters[@]}" -gt 0 ]; then
            matrix=$(printf '%s\n' "${adapters[@]}" | jq -R . | jq -sc '{include: map({adapter: .})}')
            echo "any_adapter=true" >> "$GITHUB_OUTPUT"
          else
            matrix='{"include":[]}'
            echo "any_adapter=false" >> "$GITHUB_OUTPUT"
          fi
          echo "adapter_matrix=$matrix" >> "$GITHUB_OUTPUT"

          # Base digest currently pinned in source — adapters build FROM this
          # when the base itself is not being rebuilt this run.
          cur=$(grep -oE 'bunsen-base@sha256:[0-9a-f]{64}' bunsen-core/src/oci_cache.rs | head -1 | sed 's/.*@//' || true)
          echo "current_base_digest=$cur" >> "$GITHUB_OUTPUT"

          echo "::notice::build_base=$build_base build_codex=$build_codex build_pi=$build_pi"

  # ── Base image (multi-arch, push-by-digest matrix) ──────────────────────────
  build-base:
    name: Build base ${{ matrix.platform }}
    needs: changes
    if: needs.changes.outputs.build_base == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            platform: linux/amd64
            arch: amd64
          - target: aarch64-unknown-linux-musl
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      # QEMU is needed for `docker buildx build --platform linux/arm64` on
      # an x86_64 runner. Mirrors the pattern in release.yml.
      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # bunsen-init's deps are pure Rust (libc bindings, serde, base64) so
      # no C compiler is needed at build time — only a linker that
      # understands the target's ELF format. musl-tools provides musl-gcc
      # for x86_64; gcc-aarch64-linux-gnu provides the aarch64 cross-linker
      # (used here only to link Rust's bundled musl libc into a static
      # binary, not to compile C code).
      - name: Install cross-compilation linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends musl-tools gcc-aarch64-linux-gnu

      - name: Cross-compile bunsen-init
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p bunsen-init

      # Docker COPY can only reach files inside the build context, so stage
      # the Dockerfile and the freshly compiled binary into a temp dir.
      # Mirrors adapters/_smoke-test/build-rootfs.sh.
      - name: Stage build context
        run: |
          mkdir -p build-context
          cp adapters/base/Dockerfile build-context/Dockerfile
          cp "target/${{ matrix.target }}/release/bunsen-init" build-context/bunsen-init

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push by digest without a tag — the publish job below stitches the
      # per-platform digests into the multi-arch manifest list. This is the
      # canonical buildx multi-arch matrix pattern.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: build-context
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.BASE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-base-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-base:
    name: Publish base manifest
    needs: [changes, build-base]
    if: needs.changes.outputs.build_base == 'true'
    runs-on: ubuntu-latest
    outputs:
      manifest_digest: ${{ steps.inspect.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-base-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          refs=""
          for f in *; do
            refs+=" ${REGISTRY}/${IMAGE_NAME}@sha256:${f}"
          done
          # shellcheck disable=SC2086
          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE_NAME}:latest" \
            -t "${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}" \
            ${refs}
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.BASE_IMAGE_NAME }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}

      - name: Inspect manifest digest
        id: inspect
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:latest" --format '{{json .Manifest}}' | jq -r '.digest')
          if [ -z "$digest" ] || [ "$digest" = "null" ]; then
            echo "::error::failed to extract manifest digest"
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${digest}"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.BASE_IMAGE_NAME }}

  # ── Adapter images (multi-arch in a single buildx push per adapter) ─────────
  build-adapters:
    name: Build adapter ${{ matrix.adapter }}
    needs: [changes, publish-base]
    # Runs once publish-base has concluded (success when base is rebuilt,
    # skipped otherwise). Never blocked by a skipped base publish.
    if: ${{ !cancelled() && needs.changes.outputs.any_adapter == 'true' && needs.publish-base.result != 'failure' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.adapter_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build FROM the base digest published this run (if base was rebuilt) or
      # the digest currently pinned in source (adapter-only change).
      - name: Resolve base digest
        id: base
        env:
          BUILD_BASE: ${{ needs.changes.outputs.build_base }}
          NEW_BASE: ${{ needs.publish-base.outputs.manifest_digest }}
          CUR_BASE: ${{ needs.changes.outputs.current_base_digest }}
        run: |
          set -euo pipefail
          if [ "$BUILD_BASE" = "true" ]; then digest="$NEW_BASE"; else digest="$CUR_BASE"; fi
          if [ -z "$digest" ]; then echo "::error::could not resolve base digest"; exit 1; fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Pin base in adapter Dockerfile
        env:
          BASE_DIGEST: ${{ steps.base.outputs.digest }}
        run: |
          set -euo pipefail
          df="adapters/${{ matrix.adapter }}/Dockerfile"
          sed -i -E "s|bunsen-base@sha256:[0-9a-f]{64}|bunsen-base@${BASE_DIGEST}|" "$df"
          grep -n '^FROM' "$df"

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: adapters/${{ matrix.adapter }}
          file: adapters/${{ matrix.adapter }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          provenance: false
          push: true
          tags: |
            ${{ env.REGISTRY }}/xenolf/bunsen/bunsen-adapter-${{ matrix.adapter }}:latest
            ${{ env.REGISTRY }}/xenolf/bunsen/bunsen-adapter-${{ matrix.adapter }}:${{ steps.sha.outputs.short }}

      # Stash the resulting manifest digest under a per-adapter filename so the
      # single auto-PR job can pin every adapter that was built this run.
      - name: Record digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "$DIGEST" ]; then echo "::error::build produced no digest"; exit 1; fi
          mkdir -p "${{ runner.temp }}/adigest"
          printf '%s' "$DIGEST" > "${{ runner.temp }}/adigest/${{ matrix.adapter }}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: adapter-digest-${{ matrix.adapter }}
          path: ${{ runner.temp }}/adigest/${{ matrix.adapter }}
          if-no-files-found: error
          retention-days: 1

  # ── One PR aggregating every digest pin updated this run ────────────────────
  auto-pr:
    name: Update image digest pins (single PR)
    needs: [changes, publish-base, build-adapters]
    if: ${{ !cancelled() && (needs.changes.outputs.build_base == 'true' || needs.changes.outputs.any_adapter == 'true') && needs.publish-base.result != 'failure' && needs.build-adapters.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      # Always target main: workflow_dispatch may run from a branch but the
      # digest updates belong on main (the source of truth shipped in the wheel).
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download adapter digests
        if: needs.changes.outputs.any_adapter == 'true'
        uses: actions/download-artifact@v4
        with:
          path: adapter-digests
          pattern: adapter-digest-*
          merge-multiple: true

      - name: Apply digest pins
        id: apply
        env:
          BUILD_BASE: ${{ needs.changes.outputs.build_base }}
          BASE_DIGEST: ${{ needs.publish-base.outputs.manifest_digest }}
        run: |
          set -euo pipefail
          summary=""

          # Base → DEFAULT_ROOTFS_IMAGE, and propagate into adapter FROM pins so
          # the committed adapter Dockerfiles reflect the base they were built on.
          if [ "$BUILD_BASE" = "true" ]; then
            if [ -z "$BASE_DIGEST" ]; then echo "::error::base built but no digest"; exit 1; fi
            sed -i -E 's|"ghcr\.io/xenolf/bunsen/bunsen-base@sha256:[0-9a-f]{64}"|"ghcr.io/xenolf/bunsen/bunsen-base@'"$BASE_DIGEST"'"|' \
              bunsen-core/src/oci_cache.rs
            for a in codex pi; do
              sed -i -E "s|bunsen-base@sha256:[0-9a-f]{64}|bunsen-base@${BASE_DIGEST}|" "adapters/$a/Dockerfile"
            done
            summary="${summary}- \`bunsen-base\` → \`${BASE_DIGEST}\`"$'\n'
          fi

          # Each adapter built this run → its OCI_IMAGE constant.
          if [ -d adapter-digests ]; then
            for f in adapter-digests/*; do
              [ -e "$f" ] || continue
              adapter=$(basename "$f")
              digest=$(cat "$f")
              rust="bunsen-core/src/${adapter}_adapter.rs"
              sed -i -E "s|\"ghcr\\.io/xenolf/bunsen/bunsen-adapter-${adapter}@sha256:[0-9a-f]{64}\"|\"ghcr.io/xenolf/bunsen/bunsen-adapter-${adapter}@${digest}\"|" "$rust"
              summary="${summary}- \`bunsen-adapter-${adapter}\` → \`${digest}\`"$'\n'
            done
          fi

          if git diff --quiet; then
            echo "::notice::all targeted pins already current; no PR needed"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff
          fi

          # Multi-line PR body for the single aggregated PR.
          {
            echo "PR_BODY<<PRBODY_EOF"
            echo "Auto-generated by \`.github/workflows/images.yml\` after publishing one or more guest images."
            echo ""
            echo "Updated digest pins:"
            printf '%s' "$summary"
            echo ""
            echo "Source commit: ${GITHUB_SHA}"
            echo ""
            echo "See ADR-0012 for why these constants are digest-pinned and updated via an automated PR rather than at runtime."
            echo "PRBODY_EOF"
          } >> "$GITHUB_ENV"

      - name: Open auto-PR
        if: steps.apply.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ci/update-image-digests
          delete-branch: true
          commit-message: |
            Update guest image digest pins

            Auto-generated by .github/workflows/images.yml after publishing the
            image(s) rebuilt for ${{ github.sha }}.
          title: "Update guest image digest pins"
          body: ${{ env.PR_BODY }}
